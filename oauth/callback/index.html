<!doctype html>
<html><head><meta charset="utf-8"><title>GameDrobe OAuth Callback</title>
<style>body{font-family:-apple-system,Arial,sans-serif;background:#111;color:#eee;max-width:640px;margin:60px auto;padding:24px;text-align:center}
h1{font-size:1.4rem}code{display:block;padding:16px;background:#222;border-radius:8px;word-break:break-all;font-size:1.1rem;margin:20px 0;user-select:all}
button{padding:12px 24px;font-size:1rem;background:#ff0050;color:#fff;border:none;border-radius:6px;cursor:pointer}
.ok{color:#4ade80}</style></head>
<body>
<h1>GameDrobe — TikTok Authorization</h1>
<p>Copy this code and paste it into the dashboard:</p>
<code id="code">loading...</code>
<button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent).then(()=>{this.textContent='Copied!';this.style.background='#16a34a'})">Copy code</button>
<p style="margin-top:30px;color:#888;font-size:.9rem">Then return to localhost:8888 and paste it in the "Authorization Code" field under TikTok Integration.</p>
<script>
const p = new URLSearchParams(location.search);
const code = p.get('code');
const err = p.get('error') || p.get('error_description');
const el = document.getElementById('code');
if (err) { el.textContent = 'Error: ' + err; el.style.color = '#f87171'; }
else if (code) { el.textContent = code; el.classList.add('ok'); }
else { el.textContent = 'No code in URL.'; }
</script></body></html>
